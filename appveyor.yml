# ─────────────────────────────────────────────────────────────────────────────
# Appveyor CI — Windows build & test matrix
#
# Travis CI does not support Windows. This file covers the Windows presets
# that Travis cannot run. See .travis.yml for Linux/macOS.
#
# Stages (sequential via group dependencies):
#   1. test          — plain tests (no sanitizers)
#   2. sanitizers    — sanitizer-enabled tests (ASan only on Windows)
# ─────────────────────────────────────────────────────────────────────────────
image: Visual Studio 2022

environment:
  global:
    CONAN_REVISIONS_ENABLED: 1
  matrix:
    # ── Stage 1: Plain tests ────────────────────────────────────────────────
    # MSYS2 GCC
    - JOB_NAME: "Test · win-msys2-gcc"
      JOB_GROUP: test
      MSYSTEM: MINGW64
      MSYS_PACKAGES: mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja mingw-w64-x86_64-cmake
      CONFIGURE_PRESET: win-msys2-gcc-debug
      BUILD_PRESET: win-msys2-gcc-debug
      TEST_PRESET: win-msys2-gcc-test
      USE_MSYS2: "true"

    # MSYS2 Clang
    - JOB_NAME: "Test · win-msys2-clang"
      JOB_GROUP: test
      MSYSTEM: MINGW64
      MSYS_PACKAGES: mingw-w64-x86_64-clang mingw-w64-x86_64-ninja mingw-w64-x86_64-cmake
      CONFIGURE_PRESET: win-msys2-clang-debug
      BUILD_PRESET: win-msys2-clang-debug
      TEST_PRESET: win-msys2-clang-test
      USE_MSYS2: "true"

    # MSVC
    - JOB_NAME: "Test · win-msvc"
      JOB_GROUP: test
      CONFIGURE_PRESET: win-msvc-debug
      BUILD_PRESET: win-msvc-debug
      TEST_PRESET: win-msvc-test
      USE_MSYS2: "false"

    # ── Stage 2: Sanitizer tests ────────────────────────────────────────────
    # MSYS2 GCC — ASan
    - JOB_NAME: "Sanitizer · win-msys2-gcc-test-asan"
      JOB_GROUP: sanitizers
      MSYSTEM: MINGW64
      MSYS_PACKAGES: mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja mingw-w64-x86_64-cmake
      CONFIGURE_PRESET: win-msys2-gcc-debug-asan
      BUILD_PRESET: win-msys2-gcc-debug-asan
      TEST_PRESET: win-msys2-gcc-test-asan
      USE_MSYS2: "true"

    # MSYS2 Clang — ASan
    - JOB_NAME: "Sanitizer · win-msys2-clang-test-asan"
      JOB_GROUP: sanitizers
      MSYSTEM: MINGW64
      MSYS_PACKAGES: mingw-w64-x86_64-clang mingw-w64-x86_64-ninja mingw-w64-x86_64-cmake
      CONFIGURE_PRESET: win-msys2-clang-debug-asan
      BUILD_PRESET: win-msys2-clang-debug-asan
      TEST_PRESET: win-msys2-clang-test-asan
      USE_MSYS2: "true"

    # MSVC — ASan
    - JOB_NAME: "Sanitizer · win-msvc-test-asan"
      JOB_GROUP: sanitizers
      CONFIGURE_PRESET: win-msvc-debug-asan
      BUILD_PRESET: win-msvc-debug-asan
      TEST_PRESET: win-msvc-test-asan
      USE_MSYS2: "false"

# Only build on main and develop branches + PRs
branches:
  only:
    - main

cache:
  - "%USERPROFILE%\\.conan2"

install:
  # MSYS2 path — update and install packages
  - ps: |
      if ($env:USE_MSYS2 -eq "true") {
        C:\msys64\usr\bin\bash -lc "pacman -Syu --noconfirm"
        C:\msys64\usr\bin\bash -lc "pacman -S --needed --noconfirm $env:MSYS_PACKAGES python-pip"
        C:\msys64\usr\bin\bash -lc "pip install conan && conan profile detect"
      } else {
        choco install ninja -y
        pip install conan
        conan profile detect
      }

build_script:
  - ps: |
      if ($env:USE_MSYS2 -eq "true") {
        $msysEnv = "MSYSTEM=$env:MSYSTEM"
        C:\msys64\usr\bin\bash -lc "cd '$env:APPVEYOR_BUILD_FOLDER' && cmake --preset $env:CONFIGURE_PRESET"
        C:\msys64\usr\bin\bash -lc "cd '$env:APPVEYOR_BUILD_FOLDER' && cmake --build --preset $env:BUILD_PRESET"
      } else {
        # Load MSVC environment
        & "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64
        cmake --preset $env:CONFIGURE_PRESET
        cmake --build --preset $env:BUILD_PRESET
      }

test_script:
  - ps: |
      if ($env:USE_MSYS2 -eq "true") {
        C:\msys64\usr\bin\bash -lc "cd '$env:APPVEYOR_BUILD_FOLDER' && ctest --preset $env:TEST_PRESET"
      } else {
        & "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64
        ctest --preset $env:TEST_PRESET
      }
