# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions CI — full cross-platform build & test matrix
#
# Stages:
#   1. test          — plain tests (no sanitizers, all platforms)
#   2. valgrind      — plain debug builds + ctest memcheck (Linux only)
#   3. leaks         — plain debug builds + leaks check (macOS only)
#   4. static-analysis — PVS-Studio + cppcheck + Sonar C++ (Linux only)
#   5. sanitizers    — sanitizer-enabled tests (platform-dependent)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1: Plain tests (no sanitizers)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test-linux:
    name: "Test · ${{ matrix.preset }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: linux-gcc
            configure: linux-gcc-debug
            build: linux-gcc-debug
            test: linux-gcc-test
            packages: ""
          - preset: linux-clang
            configure: linux-clang-debug
            build: linux-clang-debug
            test: linux-clang-test
            packages: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.packages }}
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Test
        run: ctest --preset ${{ matrix.test }}

  docs-linux:
    name: "Docs · linux-gcc-debug"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build doxygen
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset linux-gcc-debug
      - name: Build Doxygen docs
        run: cmake --build --preset linux-gcc-debug --target docs
      - name: Upload Doxygen HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html-${{ github.run_number }}
          path: build/linux-gcc-debug/docs/html
          if-no-files-found: error
          retention-days: 14

  test-macos:
    name: "Test · ${{ matrix.preset }}"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: macos-gcc
            configure: macos-gcc-debug
            build: macos-gcc-debug
            test: macos-gcc-test
            brew_packages: gcc ninja cmake conan
          - preset: macos-clang
            configure: macos-clang-debug
            build: macos-clang-debug
            test: macos-clang-test
            brew_packages: llvm ninja cmake conan
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (runner default)
        run: |
          sudo xcode-select -s "$(xcode-select -p)"
          xcodebuild -version
      - name: Install Homebrew packages
        run: brew install ${{ matrix.brew_packages }}
      - name: Detect Conan
        run: |
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }} -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Test
        run: ctest --preset ${{ matrix.test }}

  test-windows-msys2:
    name: "Test · ${{ matrix.preset }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: win-msys2-gcc
            configure: win-msys2-gcc-debug
            build: win-msys2-gcc-debug
            test: win-msys2-gcc-test
            msystem: MINGW64
            msys_packages: mingw-w64-x86_64-gcc mingw-w64-x86_64-ninja mingw-w64-x86_64-cmake mingw-w64-x86_64-python-pip
          - preset: win-msys2-clang-libstdc++
            configure: win-msys2-clang-libstdc++-debug
            build: win-msys2-clang-libstdc++-debug
            test: win-msys2-clang-libstdc++-test
            msystem: MINGW64
            msys_packages: mingw-w64-x86_64-clang mingw-w64-x86_64-ninja mingw-w64-x86_64-cmake mingw-w64-x86_64-python-pip
          - preset: win-msys2-clang
            configure: win-msys2-clang-debug
            build: win-msys2-clang-debug
            test: win-msys2-clang-test
            msystem: CLANG64
            msys_packages: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-ninja mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-python-pip mingw-w64-clang-x86_64-toolchain
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: ${{ matrix.msys_packages }}
          update: true
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Test
        run: ctest --preset ${{ matrix.test }}

  test-windows-msvc:
    name: "Test · win-msvc"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        run: choco install ninja -y
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure (Developer Command Prompt)
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake --preset win-msvc-debug
      - name: Build
        run: cmake --build --preset win-msvc-debug
      - name: Test
        run: ctest --preset win-msvc-test

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 2: Valgrind memcheck (Linux only, no sanitizers)
  # ───────────────────────────────────────────────────────────────────────────
  valgrind:
    name: "Valgrind · ${{ matrix.preset }}"
    needs: test-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: linux-gcc
            configure: linux-gcc-debug
            build: linux-gcc-debug
          - preset: linux-clang
            configure: linux-clang-debug
            build: linux-clang-debug
            packages: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build valgrind ${{ matrix.packages }}
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Valgrind memcheck
        run: ctest --test-dir build/${{ matrix.configure }} -T memcheck --output-on-failure

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 3: Leaks memcheck (MacOS only, no sanitizers)
  # ───────────────────────────────────────────────────────────────────────────
  leaks-macos:
    name: "Leaks · ${{ matrix.preset }}"
    needs: test-macos
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: macos-gcc
            configure: macos-gcc-debug
            build: macos-gcc-debug
            brew_packages: gcc ninja cmake conan
          - preset: macos-clang
            configure: macos-clang-debug
            build: macos-clang-debug
            brew_packages: llvm ninja cmake conan
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (runner default)
        run: |
          sudo xcode-select -s "$(xcode-select -p)"
          xcodebuild -version
      - name: Install Homebrew packages
        run: brew install ${{ matrix.brew_packages }}
      - name: Install Conan
        run: |
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }} -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Leaks check
        run: |
          TEST_EXE_NAME=$(python3 .github/workflows/resolve_test_executable.py)
          echo "Resolved test executable: $TEST_EXE_NAME"
          MallocStackLogging=1 leaks --atExit -- "./build/${{ matrix.configure }}/test/${TEST_EXE_NAME}"

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 3.5: Static analysis (Linux only)
  # ───────────────────────────────────────────────────────────────────────────
  static-analysis-cppcheck-linux:
    name: "Static Analysis · cppcheck"
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cppcheck
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset linux-gcc-debug
      - name: Build
        run: cmake --build --preset linux-gcc-debug
      - name: Run cppcheck
        run: |
          mkdir -p build/linux-gcc-debug/static-analysis

          # Machine-readable report
          cppcheck \
            --project=build/linux-gcc-debug/compile_commands.json \
            --enable=all \
            --inconclusive \
            --xml \
            --xml-version=2 \
            --output-file=build/linux-gcc-debug/static-analysis/cppcheck.xml \
            2> build/linux-gcc-debug/static-analysis/cppcheck.stderr.txt

          # Human-readable report
          cppcheck \
            --project=build/linux-gcc-debug/compile_commands.json \
            --enable=all \
            --inconclusive \
            --template=gcc \
            2> build/linux-gcc-debug/static-analysis/cppcheck.txt

      - name: Upload cppcheck artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-cppcheck-${{ github.run_number }}
          path: |
            build/linux-gcc-debug/static-analysis/cppcheck.xml
            build/linux-gcc-debug/static-analysis/cppcheck.stderr.txt
            build/linux-gcc-debug/static-analysis/cppcheck.txt
          if-no-files-found: error
          retention-days: 14

  static-analysis-pvs-linux:
    name: "Static Analysis · PVS-Studio"
    needs: test-linux
    runs-on: ubuntu-latest
    env:
      PVS_STUDIO_LICENSE: ${{ secrets.PVS_STUDIO_LICENSE }}
    steps:
      - uses: actions/checkout@v4
      - name: Run optional PVS-Studio
        run: |
          mkdir -p build/linux-gcc-debug/static-analysis

          if [ -z "$PVS_STUDIO_LICENSE" ]; then
            echo "PVS_STUDIO_LICENSE is not set; skipping PVS-Studio." > build/linux-gcc-debug/static-analysis/pvs-skipped.txt
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y ninja-build wget gnupg

          pip install conan
          conan profile detect

          wget -q -O - https://files.pvs-studio.com/etc/pubkey.txt | sudo apt-key add -
          sudo wget -q -O /etc/apt/sources.list.d/viva64.list https://files.pvs-studio.com/etc/viva64.list
          sudo apt-get update
          sudo apt-get install -y pvs-studio

          mkdir -p "$HOME/.config/PVS-Studio"
          printf '%s\n' "$PVS_STUDIO_LICENSE" > "$HOME/.config/PVS-Studio/PVS-Studio.lic"
          chmod 600 "$HOME/.config/PVS-Studio/PVS-Studio.lic"

          # Configure after PVS installation so CMake can add the pvs_analysis target.
          cmake --preset linux-gcc-debug
          cmake --build --preset linux-gcc-debug

          cmake --build --preset linux-gcc-debug --target pvs_analysis

          if [ -f build/linux-gcc-debug/pvs_report.log ]; then
            plog-converter -t tasklist -o build/linux-gcc-debug/static-analysis/pvs_report.tasklist.txt build/linux-gcc-debug/pvs_report.log || true
            plog-converter -t fullhtml -o build/linux-gcc-debug/static-analysis/pvs_html build/linux-gcc-debug/pvs_report.log || true
          fi

      - name: Upload PVS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-pvs-${{ github.run_number }}
          path: |
            build/linux-gcc-debug/static-analysis/pvs-skipped.txt
            build/linux-gcc-debug/pvs_report.log
            build/linux-gcc-debug/pvs_report.json
            build/linux-gcc-debug/static-analysis/pvs_report.tasklist.txt
            build/linux-gcc-debug/static-analysis/pvs_html
          if-no-files-found: ignore
          retention-days: 14

  static-analysis-sonar-linux:
    name: "Static Analysis · SonarCloud"
    needs: test-linux
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      BUILD_WRAPPER_OUT_DIR: build/linux-gcc-debug/static-analysis/sonar/build-wrapper
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Sonar build prerequisites
        run: |
          mkdir -p build/linux-gcc-debug/static-analysis/sonar

          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is not set; skipping Sonar." > build/linux-gcc-debug/static-analysis/sonar/sonar-skipped.txt
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y ninja-build

          pip install conan
          conan profile detect

          cmake --preset linux-gcc-debug

      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6

      - name: Run Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir "${{ env.BUILD_WRAPPER_OUT_DIR }}" \
            cmake --build --preset linux-gcc-debug --target all

          # Keep a compile_commands copy next to build-wrapper data for easier debugging.
          cp build/linux-gcc-debug/compile_commands.json "${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # Use build-wrapper mode only; CFamily forbids setting compile-commands simultaneously.
          args: >
            --define sonar.cfamily.build-wrapper-output=${{ env.BUILD_WRAPPER_OUT_DIR }}

      - name: Build human-readable Sonar report
        run: |
          mkdir -p build/linux-gcc-debug/static-analysis/sonar
          SONAR_REPORT=build/linux-gcc-debug/static-analysis/sonar/sonar-summary.txt

          if [ -f build/linux-gcc-debug/static-analysis/sonar/sonar-skipped.txt ]; then
            cat build/linux-gcc-debug/static-analysis/sonar/sonar-skipped.txt > "$SONAR_REPORT"
            exit 0
          fi

          {
            echo "SonarCloud analysis summary"
            echo "project_key=sakcakoca_cpp-project-template"
            echo "organization=sakcakoca"
            echo ""
          } > "$SONAR_REPORT"

          if [ -f .scannerwork/report-task.txt ]; then
            cat .scannerwork/report-task.txt >> "$SONAR_REPORT"
          else
            echo "report-task.txt not found; check Sonar action logs." >> "$SONAR_REPORT"
          fi

      - name: Upload Sonar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-sonar-${{ github.run_number }}
          path: |
            build/linux-gcc-debug/static-analysis/sonar
            .scannerwork/report-task.txt
          if-no-files-found: ignore
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Stage 5: Sanitizer tests
  # ───────────────────────────────────────────────────────────────────────────
  sanitizers-linux:
    name: "Sanitizer · ${{ matrix.test }}"
    needs: test-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC sanitizers
          - configure: linux-gcc-debug-asan
            build: linux-gcc-debug-asan
            test: linux-gcc-test-asan
            packages: ""
          - configure: linux-gcc-debug-tsan
            build: linux-gcc-debug-tsan
            test: linux-gcc-test-tsan
            packages: ""
          - configure: linux-gcc-debug-lsan
            build: linux-gcc-debug-lsan
            test: linux-gcc-test-lsan
            packages: ""
          # Clang sanitizers
          - configure: linux-clang-debug-asan
            build: linux-clang-debug-asan
            test: linux-clang-test-asan
            packages: clang
          - configure: linux-clang-debug-tsan
            build: linux-clang-debug-tsan
            test: linux-clang-test-tsan
            packages: clang
          - configure: linux-clang-debug-lsan
            build: linux-clang-debug-lsan
            test: linux-clang-test-lsan
            packages: clang
    steps:
      - uses: actions/checkout@v4
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build ${{ matrix.packages }}
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Test
        run: ctest --preset ${{ matrix.test }}


  sanitizers-macos:
    name: "Sanitizer · ${{ matrix.test }}"
    needs: test-macos
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configure: macos-clang-debug-asan
            build: macos-clang-debug-asan
            test: macos-clang-test-asan
            brew_packages: llvm ninja cmake conan
          - configure: macos-clang-debug-tsan
            build: macos-clang-debug-tsan
            test: macos-clang-test-tsan
            brew_packages: llvm ninja cmake conan
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (runner default)
        run: |
          sudo xcode-select -s "$(xcode-select -p)"
          xcodebuild -version
      - name: Install Homebrew packages
        run: brew install ${{ matrix.brew_packages }}
      - name: Install Conan
        run: |
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }} -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Test
        run: ctest --preset ${{ matrix.test }}

  sanitizers-windows-msys2:
    name: "Sanitizer · ${{ matrix.test }}"
    needs: test-windows-msys2
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configure: win-msys2-clang-debug-asan
            build: win-msys2-clang-debug-asan
            test: win-msys2-clang-test-asan
            msystem: CLANG64
            msys_packages: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-ninja mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-python-pip mingw-w64-clang-x86_64-toolchain
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: ${{ matrix.msys_packages }}
          update: true
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - name: Configure
        run: cmake --preset ${{ matrix.configure }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build }}
      - name: Test
        run: ctest --preset ${{ matrix.test }}

  sanitizers-windows-msvc:
    name: "Sanitizer · win-msvc-test-asan"
    needs: test-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        run: choco install ninja -y
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake --preset win-msvc-debug-asan
      - name: Build
        run: cmake --build --preset win-msvc-debug-asan
      - name: Test
        run: ctest --preset win-msvc-test-asan
